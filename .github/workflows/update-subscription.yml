name: Update Subscription

on:
  schedule:
    - cron: '0 3 * * *' # 每天UTC时间3点（即北京时间11点）运行，可自行调整
  workflow_dispatch: # 允许手动触发
  push: # 当本地文件有变更并推送时也运行（可选）

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update subscription file
        run: |
          # 使用curl获取最新的订阅内容，并覆盖subscribe.txt文件
          # 请将下一行中的URL替换为您真实的订阅地址
          curl -s -L "https://rss.main.hitun.io/link/sQrHTGf1JdLgJKoS?mu=1" > subscribe.txt
          
          # 检查文件是否成功获取内容
          if [ -s subscribe.txt ]; then
            echo "Subscription updated successfully."
          else
            echo "Failed to fetch subscription." && exit 1
          fi

      - name: Commit and push if changed
        env:
          # 显式设置远程仓库URL，并使用 secret 进行认证
          REPO_URL: https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add subscribe.txt
          timestamp=$(date -u)
          # 检查是否有文件变更
          if git diff-index --quiet HEAD; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update subscription at ${timestamp}"
            # 使用上面定义的 REPO_URL 进行推送
            git push "${REPO_URL}" HEAD:main
          fi
